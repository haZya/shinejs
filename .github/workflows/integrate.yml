name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node + Install
        uses: ./.github/actions/setup-node
        with:
          node-version: 22.x
      - name: Run ESLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node + Install
        uses: ./.github/actions/setup-node
        with:
          node-version: 22.x
      - name: Run Test
        run: npm run test

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node + Install
        uses: ./.github/actions/setup-node
        with:
          node-version: 22.x
      - name: Build packages and apps
        run: npm run build
