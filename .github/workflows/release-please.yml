name: release-please

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for OIDC (npm provenance)

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node + Install
        uses: ./.github/actions/setup-node
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: npm run build

      - name: Publish Released Packages
        run: |
          PATHS='${{ needs.release-please.outputs.paths_released }}'
          echo "Released paths: $PATHS"

          echo "$PATHS" | jq -r '.[]' | while read -r path; do
            if [ -f "$path/package.json" ]; then
              PACKAGE_NAME=$(jq -r '.name' "$path/package.json")
              IS_PRIVATE=$(jq -r '.private' "$path/package.json")

              if [ "$IS_PRIVATE" != "true" ]; then
                echo "Publishing $PACKAGE_NAME from $path..."
                npm publish -w "$path" --access public --provenance
              else
                echo "Skipping private package $PACKAGE_NAME at $path"
              fi
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
