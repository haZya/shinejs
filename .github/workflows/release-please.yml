name: release-please

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      package_path:
        description: Workspace path to publish
        required: true
        default: packages/shinejs

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for OIDC (npm provenance)

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ github.event_name == 'push' && needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node + Install
        uses: ./.github/actions/setup-node
        with:
          node-version: 24.x # Ensure npm 11.5.1 or later for trusted publishing
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: npm run build

      - name: Publish Released Packages
        run: |
          PATHS='${{ needs.release-please.outputs.paths_released }}'
          echo "Released paths: $PATHS"

          echo "$PATHS" | jq -r '.[]' | while read -r path; do
            if [ -f "$path/package.json" ]; then
              PACKAGE_NAME=$(jq -r '.name' "$path/package.json")
              IS_PRIVATE=$(jq -r '.private' "$path/package.json")

              if [ "$IS_PRIVATE" != "true" ]; then
                echo "Publishing $PACKAGE_NAME from $path..."
                npm publish -w "$path" --access public --provenance
              else
                echo "Skipping private package $PACKAGE_NAME at $path"
              fi
            fi
          done

  publish-once:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node + Install
        uses: ./.github/actions/setup-node
        with:
          node-version: 24.x # Ensure npm 11.5.1 or later for trusted publishing
          registry-url: "https://registry.npmjs.org"

      - name: Build
        run: npm run build

      - name: Publish Selected Package If Missing
        run: |
          PACKAGE_PATH='${{ github.event.inputs.package_path }}'

          if [ ! -f "$PACKAGE_PATH/package.json" ]; then
            echo "No package.json found at $PACKAGE_PATH"
            exit 1
          fi

          PACKAGE_NAME=$(jq -r '.name' "$PACKAGE_PATH/package.json")
          PACKAGE_VERSION=$(jq -r '.version' "$PACKAGE_PATH/package.json")
          IS_PRIVATE=$(jq -r '.private' "$PACKAGE_PATH/package.json")

          if [ "$IS_PRIVATE" = "true" ]; then
            echo "Skipping private package $PACKAGE_NAME at $PACKAGE_PATH"
            exit 0
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already on npm. Skipping publish."
            exit 0
          fi

          echo "Publishing $PACKAGE_NAME@$PACKAGE_VERSION from $PACKAGE_PATH..."
          npm publish -w "$PACKAGE_PATH" --access public --provenance
